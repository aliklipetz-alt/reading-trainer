<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בחירת תלמיד</title>
<link rel="stylesheet" href="style.css">

<style>
.student-box{
    max-width:800px;
    margin:30px auto;
    text-align:center;
}

input{
    width:90%;
    padding:12px;
    margin:8px;
    font-size:18px;
}

.student-item{
    border:1px solid #ccc;
    margin:5px;
    padding:10px;
    cursor:pointer;
    border-radius:8px;
}

.student-item:hover{
    background:#f0f0f0;
}
</style>
</head>

<body>

<div class="container student-box">

<h1>בחירת תלמיד</h1>

<input id="searchBox"
       placeholder="חיפוש לפי שם או טלפון"
       oninput="renderStudents()">

<div id="studentList"></div>

<hr>

<h2>תלמיד חדש</h2>

<input id="newName"
       placeholder="שם תלמיד">

<input id="newId"
       placeholder="טלפון / מזהה">

<button onclick="addStudent()">
הוסף תלמיד חדש
</button>

</div>

<script>

function getStudents(){
    return JSON.parse(
        localStorage.getItem("lexoraStudents") || "[]"
    );
}

function saveStudents(list){
    localStorage.setItem(
        "lexoraStudents",
        JSON.stringify(list)
    );
}

function selectStudent(student){

    localStorage.setItem(
        "currentStudentName",
        student.name
    );

    localStorage.setItem(
        "currentStudentId",
        student.id
    );

    localStorage.setItem(
        "currentStudent",
        student.name
    );

    window.location.href =
        "dashboard.html";
}

function renderStudents(){

    const filter =
        document.getElementById("searchBox")
        .value
        .toLowerCase();

    const container =
        document.getElementById("studentList");

    container.innerHTML = "";

    const students = getStudents();

    students
    .filter(s =>
        s.name.toLowerCase().includes(filter)
        ||
        s.id.includes(filter)
    )
    .forEach(student => {

        const div =
            document.createElement("div");

        div.className =
            "student-item";

        div.innerHTML =
            "<b>" + student.name + "</b><br>"
            + student.id;

        div.onclick =
            () => selectStudent(student);

        container.appendChild(div);

    });
}

function addStudent(){

    const name =
        document.getElementById("newName")
        .value.trim();

    const id =
        document.getElementById("newId")
        .value.trim();

    if(!name || !id){
        alert("יש למלא שם ומספר טלפון");
        return;
    }

    const students =
        getStudents();

    const existing =
        students.find(s => s.id === id);

    if(existing){

        alert(
            "התלמיד כבר קיים במערכת"
        );

        selectStudent(existing);
        return;
    }

    const student = {
        name,
        id
    };

    students.push(student);

    saveStudents(students);

    selectStudent(student);
}

renderStudents();

</script>

</body>
</html>
