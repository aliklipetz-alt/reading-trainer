<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>קול קורא</title>
<style>
body{font-family:Arial,sans-serif;background:#eef5ff;margin:0;color:#123}
.app{max-width:1000px;margin:auto;padding:20px}
.panel{background:white;border-radius:18px;padding:20px;box-shadow:0 8px 25px #0002;margin-bottom:20px}
textarea{width:100%;height:220px;font-size:22px;direction:rtl}
input,select,button{font-size:18px;padding:10px;margin:6px;border-radius:10px}
button{cursor:pointer;border:0;background:#2563eb;color:white;font-weight:bold}
.warn{background:#c62828}
.good{color:green;font-size:28px;font-weight:bold;text-align:center}
.bad{color:red;font-size:28px;font-weight:bold;text-align:center}
.word{font-size:72px;text-align:center;font-weight:bold;margin:35px}
.status{text-align:center;font-size:22px;margin:15px}
.hidden{display:none}
</style>
</head>

<body>

<div class="app">

<div id="setup" class="panel">
<h1>קול קורא</h1>
<p>כתוב כל שורה בצורה: מילה בעברית | הגייה</p>

<textarea id="wordList">כֶּלֶב | kelev
מֶלֶךְ | melech
שָׁלוֹם | shalom
בָּ | ba
בִּ | bi
בּוֹ | bo</textarea>

<br>

<label>משך סשן:</label>
<select id="sessionTime">
<option value="30">30 שניות</option>
<option value="60" selected>60 שניות</option>
<option value="120">120 שניות</option>
<option value="180">180 שניות</option>
<option value="300">300 שניות</option>
</select>

<label>שפת זיהוי:</label>
<select id="recognitionLang">
<option value="en-US" selected>English</option>
<option value="he-IL">עברית</option>
</select>

<br>

<button onclick="startSession()">התחל</button>
<a href="gan.html"><button type="button">חזרה</button></a>
</div>

<div id="game" class="panel hidden">

<div class="status">
זמן: <span id="timer">0</span> |
נכון: <span id="correct">0</span> |
טעויות: <span id="wrong">0</span>
</div>

<div id="wordBox" class="word"></div>

<div class="status">
<button onclick="speakWord()">השמע מילה</button>
<button onclick="listen()">הקשב לתלמיד</button>
<button class="warn" onclick="endSession()">סיים</button>
</div>

<div id="result" class="status"></div>
<div id="heard" class="status"></div>

</div>

</div>

<script src="../stats.js"></script>

<script>
let words = [];
let current = null;
let correct = 0;
let wrong = 0;
let startTime = 0;
let timerInterval = null;
let sessionSeconds = 60;
let running = false;

function parseWords(){
  return document.getElementById("wordList").value
    .split("\n")
    .map(line => line.trim())
    .filter(Boolean)
    .map(line => {
      const parts = line.split("|");
      return {
        hebrew: (parts[0] || "").trim(),
        speech: (parts[1] || parts[0] || "").trim().toLowerCase()
      };
    })
    .filter(w => w.hebrew && w.speech);
}

function startSession(){
  words = parseWords();

  if(words.length === 0){
    alert("אין מילים ברשימה");
    return;
  }

  correct = 0;
  wrong = 0;
  running = true;
  sessionSeconds = Number(document.getElementById("sessionTime").value);
  startTime = Date.now();

  document.getElementById("setup").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  updateHud();
  nextWord();

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const remain = Math.max(0, sessionSeconds - elapsed);
    document.getElementById("timer").textContent = remain;

    if(remain <= 0){
      endSession();
    }
  }, 500);
}

function nextWord(){
  current = words[Math.floor(Math.random() * words.length)];
  document.getElementById("wordBox").textContent = current.hebrew;
  document.getElementById("result").textContent = "";
  document.getElementById("heard").textContent = "";
  speakWord();
}

function speakWord(){
  if(!current) return;

  speechSynthesis.cancel();

  const u = new SpeechSynthesisUtterance(current.speech);
  u.lang = "en-US";
  u.rate = 0.75;
  u.pitch = 1;

  speechSynthesis.speak(u);
}

function normalizeText(t){
  return (t || "")
    .toLowerCase()
    .replace(/[.,!?;:]/g,"")
    .replace(/\s+/g," ")
    .trim();
}

function listen(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SR){
    alert("הדפדפן לא תומך בזיהוי דיבור. נסה Chrome או Edge.");
    return;
  }

  const rec = new SR();
  rec.lang = document.getElementById("recognitionLang").value;
  rec.interimResults = false;
  rec.maxAlternatives = 5;

  document.getElementById("result").textContent = "מקשיב...";

  rec.onresult = function(event){
    const alternatives = Array.from(event.results[0])
      .map(x => normalizeText(x.transcript));

    const expected = normalizeText(current.speech);

    document.getElementById("heard").textContent =
      "זוהה: " + alternatives.join(" / ");

    const ok = alternatives.some(t =>
      t === expected ||
      t.includes(expected) ||
      expected.includes(t)
    );

    if(ok){
      correct++;
      document.getElementById("result").className = "good";
      document.getElementById("result").textContent = "נכון";
      updateHud();
      setTimeout(nextWord, 900);
    } else {
      wrong++;
      document.getElementById("result").className = "bad";
      document.getElementById("result").textContent =
        "לא נכון. ההגייה הנכונה: " + current.speech;
      updateHud();
    }
  };

  rec.onerror = function(){
    document.getElementById("result").className = "bad";
    document.getElementById("result").textContent = "שגיאת מיקרופון";
  };

  rec.start();
}

function updateHud(){
  document.getElementById("correct").textContent = correct;
  document.getElementById("wrong").textContent = wrong;
}

function endSession(){
  if(!running) return;

  running = false;
  clearInterval(timerInterval);

  const elapsed = Math.round((Date.now() - startTime) / 1000);
  const total = correct + wrong;
  const percent = total ? Math.round(correct / total * 100) : 0;

  if(typeof Stats !== "undefined"){
    Stats.saveResult({
      program: "קול קורא",
      correct: correct,
      wrong: wrong,
      percent: percent,
      duration: elapsed
    });
  }

  alert(
    "הסשן הסתיים\n" +
    "נכון: " + correct + "\n" +
    "טעויות: " + wrong + "\n" +
    "דיוק: " + percent + "%"
  );

  document.getElementById("game").classList.add("hidden");
  document.getElementById("setup").classList.remove("hidden");
}
</script>

</body>
</html>
