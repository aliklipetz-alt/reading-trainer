<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>אימון מוטורי</title>
<style>
body{
  margin:0;
  background:#0f172a;
  color:white;
  font-family:Arial;
  text-align:center;
}
h1{font-size:48px;margin-top:40px;}
#stage{
  height:420px;
  display:flex;
  justify-content:center;
  align-items:center;
}
#shape{
  font-size:180px;
  transition:0.2s;
}
button{
  background:#2563eb;
  color:white;
  border:none;
  border-radius:14px;
  padding:16px 24px;
  margin:8px;
  font-size:22px;
  cursor:pointer;
}
button:hover{background:#1d4ed8;}
.info{margin-top:18px;font-size:22px;}
</style>
</head>

<body>

<h1>אימון מוטורי</h1>
<div>Motor Training</div>

<div id="stage">
  <div id="shape">🧍</div>
</div>

<div>
  <button onclick="prevPose()">⬅ הקודם</button>
  <button onclick="nextPose()">הבא ➡</button>
  <button onclick="bigger()">+ גדול</button>
  <button onclick="smaller()">- קטן</button>
  <button onclick="switchMode()">החלף מצב</button>
</div>

<div class="info" id="info">מצב גוף</div>

<script>
let mode = "body";
let index = 0;
let size = 180;

const body = ["🧍","🙆","🤸","🧎","🏃","🕺"];
const hand = ["✋","☝️","✌️","🤟","👌","👍"];

function render(){
  const list = mode === "body" ? body : hand;
  document.getElementById("shape").textContent = list[index];
  document.getElementById("shape").style.fontSize = size + "px";
  document.getElementById("info").textContent = mode === "body" ? "מצב גוף" : "מצב יד";
}

function nextPose(){
  const list = mode === "body" ? body : hand;
  index = (index + 1) % list.length;
  render();
}

function prevPose(){
  const list = mode === "body" ? body : hand;
  index = (index - 1 + list.length) % list.length;
  render();
}

function bigger(){
  size += 20;
  render();
}

function smaller(){
  size = Math.max(80, size - 20);
  render();
}

function switchMode(){
  mode = mode === "body" ? "hand" : "body";
  index = 0;
  render();
}

document.addEventListener("keydown", function(e){
  if(e.key === "ArrowRight") nextPose();
  if(e.key === "ArrowLeft") prevPose();
  if(e.key === "+") bigger();
  if(e.key === "-") smaller();
});

render();
</script>

</body>
</html>
