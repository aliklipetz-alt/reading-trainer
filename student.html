<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בחירת תלמיד</title>
<link rel="stylesheet" href="style.css">

<style>
.student-box{
  max-width:950px;
  margin:30px auto;
  text-align:center;
}

.search-wrap{
  position:relative;
  width:90%;
  margin:0 auto;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  font-size:18px;
}

#suggestionsBox{
  display:none;
  position:absolute;
  top:58px;
  right:0;
  left:0;
  background:white;
  color:black;
  border:1px solid #ccc;
  border-radius:8px;
  z-index:20;
  max-height:360px;
  overflow-y:auto;
  text-align:right;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.suggestion{
  padding:12px;
  border-bottom:1px solid #ddd;
}

.student-line{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:center;
}

.student-main{
  flex:1;
}

.small-phone{
  color:#555;
  font-size:14px;
  margin-top:4px;
}

.action-group{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.action-btn{
  padding:7px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  color:white;
  font-weight:bold;
}

.select-btn{background:#1976d2;}
.clear-btn{background:#f57c00;}
.delete-btn{background:#c62828;}

.new-student{
  margin-top:70px;
}

.admin-box{
  margin-top:35px;
  padding-top:20px;
  border-top:1px solid #ccc;
}
</style>
</head>

<body>

<div class="container student-box">

<h1>בחירת תלמיד</h1>

<div class="search-wrap">
  <input
    id="searchBox"
    type="text"
    autocomplete="off"
    placeholder="חיפוש לפי שם או טלפון"
    oninput="renderSuggestions()">

  <div id="suggestionsBox"></div>
</div>

<div class="new-student">

<h2>תלמיד חדש</h2>

<input
  id="newName"
  type="text"
  autocomplete="off"
  placeholder="שם תלמיד">

<input
  id="newPhone"
  type="text"
  autocomplete="off"
  placeholder="טלפון / מזהה">

<button onclick="addStudent()">
הוסף תלמיד חדש
</button>

</div>

<div class="admin-box">
  <button onclick="deleteAllStatsOnly()" style="background:#f57c00;color:white;">
    מחק את כל הסטטיסטיקה
  </button>
</div>

</div>

<script src="stats.js"></script>

<script>

const ADMIN_PASSWORD = "1234";

function getStudents(){
  const list =
    JSON.parse(localStorage.getItem("students") || "[]");

  return list.filter(s =>
    s &&
    s.name &&
    s.phone &&
    s.name.trim() !== "" &&
    s.phone.trim() !== ""
  );
}

function saveStudents(list){
  localStorage.setItem(
    "students",
    JSON.stringify(list)
  );
}

function renderSuggestions(){

  const search =
    document.getElementById("searchBox")
    .value
    .trim()
    .toLowerCase();

  const box =
    document.getElementById("suggestionsBox");

  box.innerHTML = "";

  if(search === ""){
    box.style.display = "none";
    return;
  }

  const matches =
    getStudents().filter(s =>
      s.name.toLowerCase().includes(search) ||
      s.phone.includes(search)
    );

  if(matches.length === 0){
    box.style.display = "none";
    return;
  }

  box.style.display = "block";

  matches.forEach(student => {

    const div =
      document.createElement("div");

    div.className =
      "suggestion";

    div.innerHTML = `
      <div class="student-line">
        <div class="student-main">
          <b>${student.name}</b>
          <div class="small-phone">${student.phone}</div>
        </div>

        <div class="action-group">
          <button class="action-btn select-btn">בחר</button>
          <button class="action-btn clear-btn">מחק סטטיסטיקה</button>
          <button class="action-btn delete-btn">מחק תלמיד</button>
        </div>
      </div>
    `;

    div.querySelector(".select-btn").onclick =
      function(e){
        e.stopPropagation();
        selectStudent(student.phone);
      };

    div.querySelector(".clear-btn").onclick =
      function(e){
        e.stopPropagation();
        deleteOnlyStudentStats(student.phone, student.name);
      };

    div.querySelector(".delete-btn").onclick =
      function(e){
        e.stopPropagation();
        deleteStudentCompletely(student.phone, student.name);
      };

    box.appendChild(div);

  });
}

function selectStudent(phone){

  const student =
    getStudents().find(s => s.phone === phone);

  if(
    !student ||
    !student.name ||
    !student.phone ||
    student.name.trim() === "" ||
    student.phone.trim() === ""
  ){
    alert("לא ניתן לבחור תלמיד ריק");
    return;
  }

  localStorage.setItem("currentStudent", student.name);
  localStorage.setItem("currentStudentName", student.name);
  localStorage.setItem("currentStudentId", student.phone);

  window.location.href =
    "dashboard.html";
}

function addStudent(){

  const name =
    document.getElementById("newName")
    .value
    .trim();

  const phone =
    document.getElementById("newPhone")
    .value
    .trim();

  if(!name || !phone){
    alert("יש למלא שם וטלפון");
    return;
  }

  const students =
    getStudents();

  const exists =
    students.find(s => s.phone === phone);

  if(exists){
    alert("התלמיד כבר קיים");
    selectStudent(phone);
    return;
  }

  students.push({
    name,
    phone
  });

  saveStudents(students);

  selectStudent(phone);
}

function askAdminPassword(){
  const pass =
    prompt("הכנס סיסמת מנהל");

  return pass === ADMIN_PASSWORD;
}

function deleteOnlyStudentStats(phone, name){

  if(!askAdminPassword()){
    alert("סיסמה שגויה");
    return;
  }

  const ok =
    confirm("למחוק רק את הסטטיסטיקה של " + name + "?");

  if(!ok) return;

  if(typeof Stats !== "undefined"){
    Stats.deleteStudentStats(phone);
  } else {
    let stats =
      JSON.parse(localStorage.getItem("lexoraStats") || "[]");

    stats =
      stats.filter(r => r.studentId !== phone);

    localStorage.setItem(
      "lexoraStats",
      JSON.stringify(stats)
    );
  }

  alert("הסטטיסטיקה נמחקה");
  renderSuggestions();
}

function deleteStudentCompletely(phone, name){

  if(!askAdminPassword()){
    alert("סיסמה שגויה");
    return;
  }

  const ok =
    confirm("למחוק את התלמיד " + name + " יחד עם כל הסטטיסטיקה שלו?");

  if(!ok) return;

  let students =
    getStudents()
    .filter(s => s.phone !== phone);

  saveStudents(students);

  if(typeof Stats !== "undefined"){
    Stats.deleteStudentStats(phone);
  }

  const currentId =
    localStorage.getItem("currentStudentId");

  if(currentId === phone){
    localStorage.removeItem("currentStudent");
    localStorage.removeItem("currentStudentName");
    localStorage.removeItem("currentStudentId");
  }

  alert("התלמיד והסטטיסטיקה נמחקו");

  document.getElementById("searchBox").value = "";
  renderSuggestions();
}

function deleteAllStatsOnly(){

  if(!askAdminPassword()){
    alert("סיסמה שגויה");
    return;
  }

  const ok =
    confirm("האם למחוק את כל הסטטיסטיקה של כל התלמידים?");

  if(!ok) return;

  if(typeof Stats !== "undefined"){
    Stats.deleteAllStats();
  } else {
    localStorage.removeItem("lexoraStats");
  }

  alert("כל הסטטיסטיקה נמחקה");
}

document.addEventListener("click", function(e){
  const searchWrap =
    document.querySelector(".search-wrap");

  if(!searchWrap.contains(e.target)){
    document.getElementById("suggestionsBox")
      .style.display = "none";
  }
});

</script>

</body>
</html>
