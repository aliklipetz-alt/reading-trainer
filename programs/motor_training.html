<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Motor Training</title>

<style>

body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial;
    overflow:hidden;
}

.container{
    width:100vw;
    height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    gap:30px;
}

h1{
    font-size:52px;
    margin:0;
}

.subtitle{
    opacity:0.7;
    font-size:22px;
}

#stage{
    width:700px;
    height:420px;

    background:rgba(255,255,255,0.05);

    border-radius:30px;

    display:flex;
    justify-content:center;
    align-items:center;

    position:relative;
}

.figure{
    position:relative;
    width:220px;
    height:300px;
}

.line{
    position:absolute;
    background:white;
    transform-origin:center;
    border-radius:10px;
}

.controls{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

button{
    border:none;
    border-radius:18px;

    padding:16px 24px;

    font-size:22px;
    font-weight:bold;

    cursor:pointer;

    background:#2563eb;
    color:white;

    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

.info{
    opacity:0.75;
    font-size:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>אימון מוטורי</h1>
<div class="subtitle">Motor Training</div>

<div id="stage">

<div class="figure" id="figure"></div>

</div>

<div class="controls">

<button onclick="prevPose()">⬅ הקודם</button>

<button onclick="nextPose()">הבא ➡</button>

<button onclick="bigger()">＋ גדול</button>

<button onclick="smaller()">－ קטן</button>

<button onclick="switchMode()">החלף מצב</button>

</div>

<div class="info" id="info">
מצב גוף
</div>

</div>

<script>

const info = document.getElementById("info");

"one"

function drawBody(type){

figure.innerHTML="";

const head = createLine(80,10,60,60,0,true);

const body = createLine(105,70,10,100,0);

const leftLeg = createLine(80,165,10,90,25);
const rightLeg = createLine(120,165,10,90,-25);

let leftArm;
let rightArm;

if(type==="normal"){

leftArm=createLine(60,90,70,10,20);
rightArm=createLine(90,90,70,10,-20);

}

if(type==="arms_up"){

leftArm=createLine(55,70,80,10,-60);
rightArm=createLine(85,70,80,10,60);

}

if(type==="arms_side"){

leftArm=createLine(35,105,90,10,0);
rightArm=createLine(95,105,90,10,0);

}

if(type==="sit"){

leftArm=createLine(60,100,70,10,20);
rightArm=createLine(90,100,70,10,-20);

leftLeg.style.transform="rotate(90deg)";
rightLeg.style.transform="rotate(90deg)";

leftLeg.style.top="210px";
rightLeg.style.top="230px";

}

if(type==="one_arm"){

leftArm=createLine(60,90,70,10,-50);
rightArm=createLine(90,90,70,10,-20);

}

figure.appendChild(head);
figure.appendChild(body);
figure.appendChild(leftLeg);
figure.appendChild(rightLeg);

figure.appendChild(leftArm);
figure.appendChild(rightArm);

}

if(type==="three"){

finger(85,25,0);
finger(110,20,0);
finger(135,25,0);
finger(60,70,-45);

}

if(type==="one"){

finger(110,20,0);
finger(60,70,-45);

}

}
