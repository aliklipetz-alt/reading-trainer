<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בחירת תלמיד</title>
<link rel="stylesheet" href="style.css">

<style>
.student-box{max-width:1000px;margin:30px auto;text-align:center}
input{width:90%;padding:12px;margin:8px;font-size:18px}
table{width:100%;border-collapse:collapse;margin-top:20px;background:white}
th,td{border:1px solid #ccc;padding:10px;text-align:center}
.action-btn{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;color:white}
.select-btn{background:#1976d2}
.delete-btn{background:#c62828}
#resultsArea{display:none}
</style>
</head>

<body>

<div class="container student-box">

<h1>בחירת תלמיד</h1>

<input
id="searchBox"
type="text"
autocomplete="off"
placeholder="חיפוש לפי שם או טלפון"
oninput="renderStudents()">

<div id="resultsArea">
<table>
<thead>
<tr>
<th>שם תלמיד</th>
<th>טלפון / מזהה</th>
<th>פעולות</th>
</tr>
</thead>
<tbody id="studentTable"></tbody>
</table>
</div>

<h2 style="margin-top:40px;">תלמיד חדש</h2>

<input id="newName" type="text" autocomplete="off" placeholder="שם תלמיד">
<input id="newPhone" type="text" autocomplete="off" placeholder="טלפון / מזהה">

<button onclick="addStudent()">הוסף תלמיד חדש</button>

</div>

<script>

function getStudents(){
    const list = JSON.parse(localStorage.getItem("students") || "[]");

    return list.filter(s =>
        s &&
        s.name &&
        s.phone &&
        s.name.trim() !== "" &&
        s.phone.trim() !== ""
    );
}

function saveStudents(list){
    localStorage.setItem("students", JSON.stringify(list));
}

function renderStudents(){
    const search = document.getElementById("searchBox").value.trim().toLowerCase();
    const table = document.getElementById("studentTable");
    const resultsArea = document.getElementById("resultsArea");

    table.innerHTML = "";

    if(search === ""){
        resultsArea.style.display = "none";
        return;
    }

    const filtered = getStudents().filter(s =>
        s.name.toLowerCase().includes(search) ||
        s.phone.includes(search)
    );

    if(filtered.length === 0){
        resultsArea.style.display = "none";
        return;
    }

    resultsArea.style.display = "block";

    filtered.forEach(student => {
        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${student.name}</td>
            <td>${student.phone}</td>
            <td>
                <button class="action-btn select-btn" onclick="selectStudent('${student.phone}')">בחר</button>
                <button class="action-btn delete-btn" onclick="deleteStudent('${student.phone}')">מחק</button>
            </td>
        `;

        table.appendChild(row);
    });
}

function selectStudent(phone){
    const student = getStudents().find(s => s.phone === phone);

    if(
        !student ||
        !student.name ||
        !student.phone ||
        student.name.trim() === "" ||
        student.phone.trim() === ""
    ){
        alert("לא ניתן לבחור תלמיד ריק");
        return;
    }

    localStorage.setItem("currentStudent", student.name);
    localStorage.setItem("currentStudentName", student.name);
    localStorage.setItem("currentStudentId", student.phone);

    window.location.href = "dashboard.html";
}

function addStudent(){
    const name = document.getElementById("newName").value.trim();
    const phone = document.getElementById("newPhone").value.trim();

    if(!name || !phone){
        alert("יש למלא שם וטלפון");
        return;
    }

    const students = getStudents();

    const exists = students.find(s => s.phone === phone);

    if(exists){
        alert("התלמיד כבר קיים");
        selectStudent(phone);
        return;
    }

    students.push({name, phone});
    saveStudents(students);

    selectStudent(phone);
}

function deleteStudent(phone){
    const pass = prompt("הכנס סיסמה למחיקה");

    if(pass !== "1234"){
        alert("סיסמה שגויה");
        return;
    }

    let students = getStudents().filter(s => s.phone !== phone);
    saveStudents(students);

    let stats = JSON.parse(localStorage.getItem("lexoraStats") || "[]");
    stats = stats.filter(r => r.studentId !== phone);

    localStorage.setItem("lexoraStats", JSON.stringify(stats));

    renderStudents();
}

renderStudents();

</script>

</body>
</html>
