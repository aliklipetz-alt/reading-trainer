<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אימון מוטורי לקריאה</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f3f6fb;
  color: #111827;
}

header {
  padding: 14px 22px;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header a {
  color: white;
  text-decoration: none;
}

main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px;
  text-align: center;
}

h1 {
  font-size: 34px;
  margin-bottom: 8px;
}

.subtitle {
  color: #64748b;
  margin-bottom: 20px;
}

.controls {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 24px;
}

button {
  border: none;
  background: #2563eb;
  color: white;
  padding: 12px 18px;
  border-radius: 12px;
  font-size: 17px;
  cursor: pointer;
}

button.secondary {
  background: #475569;
}

.stage {
  background: white;
  border: 1px solid #dbe3ef;
  border-radius: 24px;
  min-height: 520px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
  overflow: hidden;
}

.pose-title {
  font-size: 26px;
  font-weight: bold;
  margin-top: 20px;
}

svg {
  width: 420px;
  height: 420px;
  transform-origin: center;
}

.line {
  stroke: #111827;
  stroke-width: 14;
  stroke-linecap: round;
  fill: none;
}

.head {
  fill: none;
  stroke: #111827;
  stroke-width: 12;
}

.hand-line {
  stroke: #111827;
  stroke-width: 16;
  stroke-linecap: round;
  fill: none;
}

.palm {
  fill: #ffffff;
  stroke: #111827;
  stroke-width: 10;
}

.hint {
  margin-top: 18px;
  color: #64748b;
  font-size: 15px;
}

@media (max-width: 700px) {
  svg {
    width: 320px;
    height: 320px;
  }

  .stage {
    min-height: 420px;
  }
}
</style>
</head>

<body>

<header>
  <b>LexoraLab</b>
  <a href="../cheder.html">חזרה / Back</a>
</header>

<main>
  <h1>אימון מוטורי לקריאה</h1>
  <div class="subtitle">Motor Reading Training</div>

  <div class="controls">
    <button onclick="setMode('body')">גוף / Body</button>
    <button onclick="setMode('hand')">יד / Hand</button>
    <button class="secondary" onclick="prevPose()">← קודם</button>
    <button class="secondary" onclick="nextPose()">הבא →</button>
    <button class="secondary" onclick="randomPose()">אקראי</button>
    <button class="secondary" onclick="zoomIn()">+</button>
    <button class="secondary" onclick="zoomOut()">−</button>
  </div>

  <div class="stage" id="stage"></div>

  <div class="pose-title" id="poseTitle"></div>

  <div class="hint">
    חצים ימינה/שמאלה = מעבר בין תנוחות · + / - = שינוי גודל · רווח = תנוחה אקראית
  </div>
</main>
