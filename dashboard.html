<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - LexoraLab</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <script>
    if (localStorage.getItem("lexora_logged_in") !== "yes") {
      window.location.href = "login.html";
    }
  </script>

  <header class="topbar">
    <b>LexoraLab</b>
    <button onclick="logout()">יציאה / Logout</button>
  </header>

  <main class="container">
    <h1>לוח אימונים</h1>

    <div class="card">
      <h2>אימון קריאה</h2>
      <p>כאן נוסיף את התרגילים שלך.</p>
    </div>

    <div class="card">
      <h2>סטטיסטיקה</h2>
      <p>כאן תופיע סטטיסטיקה של המשתמש.</p>
    </div>
  </main>

  <script>
    function logout() {
      localStorage.removeItem("lexora_logged_in");
      window.location.href = "login.html";
    }
  </script>
</body>
</html>
