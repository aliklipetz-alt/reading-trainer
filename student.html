<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בחירת תלמיד</title>
<link rel="stylesheet" href="style.css">

<style>
.student-box{
  max-width:900px;
  margin:30px auto;
  text-align:center;
}

.search-wrap{
  position:relative;
  width:90%;
  margin:0 auto;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  font-size:18px;
}

#suggestionsBox{
  display:none;
  position:absolute;
  top:58px;
  right:0;
  left:0;
  background:white;
  color:black;
  border:1px solid #ccc;
  border-radius:8px;
  z-index:20;
  max-height:300px;
  overflow-y:auto;
  text-align:right;
}

.suggestion{
  padding:12px;
  border-bottom:1px solid #ddd;
  cursor:pointer;
}

.suggestion:hover{
  background:#e8f0ff;
}

.small-phone{
  color:#555;
  font-size:14px;
  margin-top:4px;
}

.new-student{
  margin-top:70px;
}

button{
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container student-box">

<h1>בחירת תלמיד</h1>

<div class="search-wrap">
  <input
    id="searchBox"
    type="text"
    autocomplete="off"
    placeholder="חיפוש לפי שם או טלפון"
    oninput="renderSuggestions()">

  <div id="suggestionsBox"></div>
</div>

<div class="new-student">

<h2>תלמיד חדש</h2>

<input
  id="newName"
  type="text"
  autocomplete="off"
  placeholder="שם תלמיד">

<input
  id="newPhone"
  type="text"
  autocomplete="off"
  placeholder="טלפון / מזהה">

<button onclick="addStudent()">
הוסף תלמיד חדש
</button>

</div>

</div>

<script>

function getStudents(){
  const list =
    JSON.parse(localStorage.getItem("students") || "[]");

  return list.filter(s =>
    s &&
    s.name &&
    s.phone &&
    s.name.trim() !== "" &&
    s.phone.trim() !== ""
  );
}

function saveStudents(list){
  localStorage.setItem(
    "students",
    JSON.stringify(list)
  );
}

function renderSuggestions(){

  const search =
    document.getElementById("searchBox")
    .value
    .trim()
    .toLowerCase();

  const box =
    document.getElementById("suggestionsBox");

  box.innerHTML = "";

  if(search === ""){
    box.style.display = "none";
    return;
  }

  const matches =
    getStudents().filter(s =>
      s.name.toLowerCase().includes(search) ||
      s.phone.includes(search)
    );

  if(matches.length === 0){
    box.style.display = "none";
    return;
  }

  box.style.display = "block";

  matches.forEach(student => {

    const div =
      document.createElement("div");

    div.className =
      "suggestion";

    div.innerHTML =
      "<b>" + student.name + "</b>" +
      "<div class='small-phone'>" + student.phone + "</div>";

    div.onclick =
      () => selectStudent(student.phone);

    box.appendChild(div);

  });
}

function selectStudent(phone){

  const student =
    getStudents().find(s => s.phone === phone);

  if(
    !student ||
    !student.name ||
    !student.phone ||
    student.name.trim() === "" ||
    student.phone.trim() === ""
  ){
    alert("לא ניתן לבחור תלמיד ריק");
    return;
  }

  localStorage.setItem("currentStudent", student.name);
  localStorage.setItem("currentStudentName", student.name);
  localStorage.setItem("currentStudentId", student.phone);

  window.location.href =
    "dashboard.html";
}

function addStudent(){

  const name =
    document.getElementById("newName")
    .value
    .trim();

  const phone =
    document.getElementById("newPhone")
    .value
    .trim();

  if(!name || !phone){
    alert("יש למלא שם וטלפון");
    return;
  }

  const students =
    getStudents();

  const exists =
    students.find(s => s.phone === phone);

  if(exists){
    alert("התלמיד כבר קיים");
    selectStudent(phone);
    return;
  }

  students.push({
    name,
    phone
  });

  saveStudents(students);

  selectStudent(phone);
}

document.addEventListener("click", function(e){
  const searchWrap =
    document.querySelector(".search-wrap");

  if(!searchWrap.contains(e.target)){
    document.getElementById("suggestionsBox")
      .style.display = "none";
  }
});

</script>

</body>
</html>
