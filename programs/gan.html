<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>גן ילדים</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <b>LexoraLab</b>
  <a href="dashboard.html" class="small-link">חזרה</a>
</header>

<div class="container">

  <h1>גן ילדים</h1>

  <div id="studentInfo"
       style="font-size:20px; font-weight:bold; color:#004080; margin-bottom:20px;">
  </div>

  <div class="programs">

    <a href="programs/motor_training.html" class="program-button">
      אימון מוטורי
      <span>Motor Training</span>
    </a>

    <a href="programs/word_picture.html" class="program-button">
      מילה ותמונה
      <span>Word & Picture</span>
    </a>

    <a href="programs/nikud_training.html" class="program-button">
      אימון ניקוד
      <span>Nikud Training</span>
    </a>

    <a href="programs/ticker_words.html" class="program-button">
      טיקר מילים
      <span>Reading Ticker</span>
    </a>

  </div>

</div>

<script>
const studentName = localStorage.getItem("currentStudentName");
const studentId = localStorage.getItem("currentStudentId");

if (
  !studentName ||
  !studentId ||
  studentName.trim() === "" ||
  studentId.trim() === ""
) {
  window.location.href = "student.html";
}

const info = document.getElementById("studentInfo");

if (info) {
  info.innerHTML =
    "תלמיד: " + studentName + " | מזהה: " + studentId;
}
</script>

</body>
</html>
