<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - LexoraLab</title>
<link rel="stylesheet" href="style.css">

<script>
function login() {
    const password = document.getElementById("password").value;

    if (password === "1234") {
        window.location.href = "dashboard.html";
    } else {
        document.getElementById("error").innerText = "סיסמה שגויה / Wrong password";
    }
}
</script>

</head>

<body class="login">

<div class="login-box">
    <h1>LexoraLab</h1>
    <p>כניסה למערכת</p>

    <input type="password" id="password" placeholder="Password / סיסמה">

    <button onclick="login()">כניסה / Login</button>

    <p id="error" style="color:red;"></p>
</div>

</body>
</html>
