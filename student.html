<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בחירת תלמיד</title>
<link rel="stylesheet" href="style.css">

<style>
.student-box{
  max-width:1000px;
  margin:30px auto;
  text-align:center;
}

input{
  width:90%;
  padding:12px;
  margin:8px;
  font-size:18px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
  background:white;
}

th,td{
  border:1px solid #ccc;
  padding:10px;
  text-align:center;
}

th{
  background:#eeeeee;
}

.action-btn{
  padding:8px 14px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container student-box">

<h1>בחירת תלמיד</h1>

<input id="searchBox"
       placeholder="חיפוש לפי שם או טלפון"
       autocomplete="off"
       oninput="renderStudents()">

<table>
<thead>
<tr>
<th>שם תלמיד</th>
<th>טלפון / מזהה</th>
<th>פעולה</th>
</tr>
</thead>
<tbody id="studentTable"></tbody>
</table>

<hr>

<h2>תלמיד חדש</h2>

<input id="newName" placeholder="שם תלמיד">
<input id="newId" placeholder="טלפון / מזהה">

<button onclick="addStudent()">
הוסף תלמיד חדש
</button>

</div>

<script>

function getStudents(){
  return JSON.parse(localStorage.getItem("lexoraStudents") || "[]");
}

function saveStudents(list){
  localStorage.setItem("lexoraStudents", JSON.stringify(list));
}

function selectStudent(student){
  localStorage.setItem("currentStudentName", student.name);
  localStorage.setItem("currentStudentId", student.id);
  localStorage.setItem("currentStudent", student.name);
  window.location.href = "dashboard.html";
}

function renderStudents(){
  const filter = document.getElementById("searchBox").value.toLowerCase();
  const tbody = document.getElementById("studentTable");
  tbody.innerHTML = "";

  getStudents()
    .filter(s =>
      s.name.toLowerCase().includes(filter) ||
      s.id.toLowerCase().includes(filter)
    )
    .forEach(student => {
      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${student.name}</td>
        <td>${student.id}</td>
        <td>
          <button class="action-btn">בחר</button>
        </td>
      `;

      row.querySelector("button").onclick =
        () => selectStudent(student);

      tbody.appendChild(row);
    });
}

function addStudent(){
  const name = document.getElementById("newName").value.trim();
  const id = document.getElementById("newId").value.trim();

  if(!name || !id){
    alert("יש למלא שם ומספר טלפון");
    return;
  }

  const students = getStudents();
  const existing = students.find(s => s.id === id);

  if(existing){
    alert("התלמיד כבר קיים במערכת");
    selectStudent(existing);
    return;
  }

  const student = { name, id };

  students.push(student);
  saveStudents(students);
  selectStudent(student);
}

renderStudents();

</script>

</body>
</html>
